name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: harness-mcp-linux
          - os: macos-latest
            target: macos
            artifact: harness-mcp-macos
          - os: windows-latest
            target: windows
            artifact: harness-mcp.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[yaml]"

      - name: Build binary
        run: |
          pyinstaller --onefile \
            --name ${{ matrix.artifact }} \
            --add-data "src/harness_mcp/catalog_data:harness_mcp/catalog_data" \
            --hidden-import yaml \
            src/harness_mcp/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: harness-mcp-*
          path: release-assets/
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## harness-mcp ${{ github.ref_name }}

            ### Standalone Binaries (no Python required)

            Download the binary for your platform:

            - `harness-mcp-linux` — Linux x86_64
            - `harness-mcp-macos` — macOS (Apple Silicon / Intel)
            - `harness-mcp.exe` — Windows x86_64

            ### Or install via package manager

            ```bash
            # Python (pip)
            pip install harness-mcp

            # Node.js (npm)
            npm install -g harness-mcp
            ```

            ### Verifying

            ```bash
            ./harness-mcp-linux --help
            ```
          files: |
            release-assets/*
          draft: false
          prerelease: false
